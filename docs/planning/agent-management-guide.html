<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Management Guide</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232735;
    --border: #2e3347;
    --text: #e2e4ed;
    --text-dim: #8b90a5;
    --accent: #7c6bf0;
    --accent-glow: rgba(124,107,240,.15);
    --green: #34d399;
    --green-dim: rgba(52,211,153,.12);
    --orange: #f59e0b;
    --orange-dim: rgba(245,158,11,.12);
    --red: #f87171;
    --red-dim: rgba(248,113,113,.12);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,.12);
    --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.65;
    min-height: 100vh;
  }

  /* HEADER */
  .hero {
    padding: 48px 24px 36px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(124,107,240,.06) 0%, transparent 100%);
  }
  .hero h1 { font-size: 2rem; font-weight: 700; letter-spacing: -.02em; margin-bottom: 8px; }
  .hero p { color: var(--text-dim); font-size: .95rem; max-width: 600px; margin: 0 auto; }
  .hero .tagline { color: var(--accent); font-weight: 600; font-size: .8rem; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px; }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    max-width: 480px; margin: 20px auto 0; display:flex; align-items:center; gap:12px;
  }
  .progress-track { flex:1; height:8px; background:var(--surface2); border-radius:99px; overflow:hidden; }
  .progress-fill { height:100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius:99px; transition: width .5s ease; }
  .progress-label { font-size:.8rem; color:var(--text-dim); min-width:42px; text-align:right; font-variant-numeric: tabular-nums; }

  /* NAV TABS */
  .nav { display:flex; gap:6px; padding:16px 24px 0; max-width:900px; margin:0 auto; flex-wrap:wrap; }
  .nav-btn {
    padding: 8px 16px; border-radius: 99px; border: 1px solid var(--border); background: var(--surface);
    color: var(--text-dim); font-size: .82rem; cursor: pointer; transition: all .2s; font-weight: 500;
    display: flex; align-items: center; gap: 6px; white-space: nowrap;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--text); }
  .nav-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .nav-btn .dot { width:8px; height:8px; border-radius:50%; background: var(--border); flex-shrink:0; }
  .nav-btn.done .dot { background: var(--green); }
  .nav-btn.partial .dot { background: var(--orange); }

  /* MAIN CONTENT */
  .container { max-width: 900px; margin: 0 auto; padding: 24px 24px 80px; }

  /* SKILL PANELS */
  .skill-panel { display: none; }
  .skill-panel.active { display: block; }

  .skill-header {
    padding: 28px; background: var(--surface); border-radius: var(--radius);
    border: 1px solid var(--border); margin-bottom: 20px;
  }
  .skill-header .skill-num { font-size: .75rem; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
  .skill-header h2 { font-size: 1.45rem; font-weight: 700; margin-bottom: 8px; }
  .skill-header .subtitle { color: var(--text-dim); font-size: .9rem; }

  /* EXPANDABLE SECTIONS */
  .section {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    margin-bottom: 10px; overflow: hidden;
  }
  .section-head {
    padding: 16px 20px; cursor: pointer; display: flex; align-items: center; gap: 12px;
    user-select: none; transition: background .15s;
  }
  .section-head:hover { background: var(--surface2); }
  .section-head .arrow {
    width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); transition: transform .25s; flex-shrink: 0; font-size: .75rem;
  }
  .section.open .section-head .arrow { transform: rotate(90deg); }
  .section-head h3 { font-size: .92rem; font-weight: 600; flex: 1; }
  .section-head .badge {
    font-size: .7rem; padding: 2px 8px; border-radius: 99px; font-weight: 600;
  }
  .badge-setup { background: var(--blue-dim); color: var(--blue); }
  .badge-template { background: var(--accent-glow); color: var(--accent); }
  .badge-workflow { background: var(--green-dim); color: var(--green); }
  .badge-reference { background: var(--orange-dim); color: var(--orange); }

  .section-body { display: none; padding: 0 20px 20px; }
  .section.open .section-body { display: block; }
  .section-body p { margin-bottom: 12px; color: var(--text); font-size: .88rem; }
  .section-body ul, .section-body ol { margin-bottom: 12px; padding-left: 20px; }
  .section-body li { margin-bottom: 6px; font-size: .88rem; color: var(--text); }
  .section-body strong { color: #fff; }
  .section-body em { color: var(--accent); font-style: normal; }

  /* CODE BLOCKS */
  .code-wrap { position: relative; margin: 12px 0; }
  pre {
    background: #13151e; border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; overflow-x: auto; font-size: .82rem; line-height: 1.6;
    color: #c9d1d9; font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
  }
  .copy-btn {
    position: absolute; top: 8px; right: 8px; padding: 4px 10px; font-size: .7rem;
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text-dim); cursor: pointer; transition: all .2s;
  }
  .copy-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .copy-btn.copied { background: var(--green); color: #fff; border-color: var(--green); }

  /* TABLES */
  .table-wrap { overflow-x: auto; margin: 12px 0; border-radius: 8px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: .84rem; }
  th { background: var(--surface2); padding: 10px 14px; text-align: left; font-weight: 600; color: var(--text); border-bottom: 1px solid var(--border); }
  td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--text); }
  tr:last-child td { border-bottom: none; }
  code { background: var(--surface2); padding: 2px 6px; border-radius: 4px; font-size: .82rem; font-family: 'SF Mono', Consolas, monospace; }

  /* PROMPT CARDS */
  .prompt-card {
    background: var(--accent-glow); border: 1px solid rgba(124,107,240,.25); border-radius: 8px;
    padding: 14px 16px; margin: 12px 0; position: relative; cursor: pointer;
  }
  .prompt-card::before { content: 'PROMPT — click to copy'; display:block; font-size:.65rem; color:var(--accent); font-weight:700; text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; }
  .prompt-card p { font-size: .86rem; font-style: italic; color: var(--text); margin: 0; }
  .prompt-card.copied-card { border-color: var(--green); }
  .prompt-card.copied-card::before { content: 'COPIED!'; color: var(--green); }

  /* CHECKLIST */
  .checklist { margin: 14px 0; }
  .check-item {
    display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; cursor: pointer; user-select: none;
  }
  .check-item input { display: none; }
  .check-box {
    width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 5px;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 1px;
    transition: all .2s;
  }
  .check-item input:checked ~ .check-box { background: var(--green); border-color: var(--green); }
  .check-item input:checked ~ .check-box::after { content: '\2713'; color: #fff; font-size: .75rem; font-weight: 700; }
  .check-item input:checked ~ .check-label { text-decoration: line-through; color: var(--text-dim); }
  .check-label { font-size: .88rem; }

  /* ITERATION TIMELINE */
  .timeline { margin: 14px 0; padding-left: 20px; border-left: 2px solid var(--border); }
  .tl-item { padding: 0 0 20px 16px; position: relative; }
  .tl-item::before {
    content: ''; position: absolute; left: -26px; top: 4px; width: 12px; height: 12px;
    border-radius: 50%; background: var(--surface2); border: 2px solid var(--accent);
  }
  .tl-item:last-child { padding-bottom: 0; }
  .tl-item h4 { font-size: .85rem; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .tl-item p { font-size: .84rem; color: var(--text-dim); }

  /* WORKFLOW DIAGRAM */
  .workflow-wrap {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 24px; margin: 20px 0;
  }
  .workflow-wrap h3 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; text-align: center; }
  .wf-steps { display: flex; flex-direction: column; gap: 4px; align-items: center; }
  .wf-step {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 20px; font-size: .82rem; text-align: center; max-width: 340px; width: 100%;
  }
  .wf-step.highlight { border-color: var(--accent); background: var(--accent-glow); }
  .wf-arrow { color: var(--text-dim); font-size: .9rem; }
  .wf-branch { display: flex; gap: 12px; align-items: center; width: 100%; max-width: 500px; justify-content: center; }
  .wf-branch .wf-step { flex: 1; }
  .wf-branch-label { font-size: .72rem; color: var(--text-dim); font-weight: 600; }

  /* ALERT BOXES */
  .alert {
    padding: 14px 16px; border-radius: 8px; margin: 12px 0; font-size: .85rem;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .alert-icon { font-size: 1.1rem; flex-shrink: 0; }
  .alert-warn { background: var(--orange-dim); border: 1px solid rgba(245,158,11,.2); }
  .alert-danger { background: var(--red-dim); border: 1px solid rgba(248,113,113,.2); }
  .alert-tip { background: var(--green-dim); border: 1px solid rgba(52,211,153,.2); }

  /* RESPONSIVE */
  @media (max-width:600px) {
    .hero h1 { font-size:1.5rem; }
    .nav { padding: 12px 16px 0; }
    .container { padding: 16px 16px 80px; }
    .wf-branch { flex-direction: column; }
  }
</style>
</head>

<div class="hero">
  <div class="tagline">From Vibe Coding to Agent Management</div>
  <h1>The 5 Skills You Need</h1>
  <p>An interactive guide to managing AI coding agents. Not about writing code — about managing the thing that writes code for you.</p>
  <div class="progress-bar-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel">0 / 26</div>
  </div>
</div>

<div class="nav" id="navTabs"></div>

<div class="container" id="content"></div>

<script>
// ─── DATA ────────────────────────────────────────────────────
const skills = [
  {
    id: 'skill1',
    num: 'Skill 1',
    title: 'Save Points',
    subtitle: 'Version control with Git — your unlimited undo button that no agent can erase.',
    sections: [
      {
        title: 'Why This Matters',
        badge: 'reference',
        content: `
<p>Your agent can read files, rewrite them, delete them, and run commands that alter your entire project. Without save points, a single bad agent run can destroy hours of working software with no way back.</p>
<div class="alert alert-danger"><span class="alert-icon">&#9888;</span><div>A senior developer lost a production database when their agent made a "minor change" with no versioning. The data was recoverable — but the hours of panic were not.</div></div>
<p>Git takes a permanent snapshot of every file in your project. You can jump back to any snapshot at any time. Think of it as save points in a video game — the agent can never overwrite them.</p>
`
      },
      {
        title: 'Setup (One Time, ~15 Min)',
        badge: 'setup',
        content: `
<p><strong>Step 1 — Check if Git is installed.</strong> Open a terminal and type:</p>
<div class="code-wrap"><pre>git --version</pre><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<p>If you see a version number, you're set. If not, download from <strong>git-scm.com</strong>.</p>

<p><strong>Step 2 — Initialize your project.</strong> Navigate to your project folder and run:</p>
<div class="code-wrap"><pre>git init</pre><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>

<p><strong>Step 3 — Create a .gitignore.</strong> Ask your agent:</p>
<div class="prompt-card" onclick="copyPrompt(this)"><p>Create a .gitignore file appropriate for this project's tech stack. Include node_modules, .env files, and any build output directories.</p></div>

<p><strong>Step 4 — First save point.</strong></p>
<div class="code-wrap"><pre>git add .
git commit -m "Initial working version"</pre><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
`
      },
      {
        title: 'The 6 Commands You Need',
        badge: 'reference',
        content: `
<div class="table-wrap"><table>
<tr><th>Command</th><th>What It Does</th><th>When To Use</th></tr>
<tr><td><code>git add .</code></td><td>Stages all changes for the next save</td><td>Before every commit</td></tr>
<tr><td><code>git commit -m "msg"</code></td><td>Creates the save point with a label</td><td>Every time something works</td></tr>
<tr><td><code>git log --oneline</code></td><td>Shows your save point history</td><td>Finding a previous version</td></tr>
<tr><td><code>git diff</code></td><td>Shows what changed since last save</td><td>Before committing — review agent's work</td></tr>
<tr><td><code>git checkout .</code></td><td>Reverts all uncommitted changes</td><td>When the agent just broke something</td></tr>
<tr><td><code>git checkout -b name</code></td><td>Creates a parallel branch for experiments</td><td>Before risky changes</td></tr>
</table></div>
`
      },
      {
        title: 'The Save-Test-Commit Workflow',
        badge: 'workflow',
        content: `
<p>Use this rhythm <strong>every time</strong> you work with an agent:</p>
<div class="checklist">
  <label class="check-item"><input type="checkbox" data-skill="1"><span class="check-box"></span><span class="check-label"><strong>Verify</strong> your project works — load it, click around, confirm</span></label>
  <label class="check-item"><input type="checkbox" data-skill="1"><span class="check-box"></span><span class="check-label"><strong>Commit</strong> — <code>git add .</code> then <code>git commit -m "working: description"</code></span></label>
  <label class="check-item"><input type="checkbox" data-skill="1"><span class="check-box"></span><span class="check-label"><strong>Give the agent one focused task</strong> (see Skill 4)</span></label>
  <label class="check-item"><input type="checkbox" data-skill="1"><span class="check-box"></span><span class="check-label"><strong>Review</strong> — run <code>git diff</code> to see every file the agent touched</span></label>
  <label class="check-item"><input type="checkbox" data-skill="1"><span class="check-box"></span><span class="check-label"><strong>Test</strong> — does the app still work? Does the new thing work?</span></label>
  <label class="check-item"><input type="checkbox" data-skill="1"><span class="check-box"></span><span class="check-label"><strong>If yes → commit.</strong> If no → <code>git checkout .</code> to revert and try again</span></label>
</div>
`
      },
      {
        title: 'Branching for Risky Experiments',
        badge: 'reference',
        content: `
<p>When you're about to try something that might break things, create a branch:</p>
<div class="code-wrap"><pre>git checkout -b experiment-new-feature</pre><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>

<p><strong>If it works</strong> — merge it back:</p>
<div class="code-wrap"><pre>git checkout main
git merge experiment-new-feature</pre><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>

<p><strong>If it fails</strong> — just abandon it:</p>
<div class="code-wrap"><pre>git checkout main
git branch -d experiment-new-feature</pre><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<p>Your main project was never touched.</p>
`
      },
      {
        title: 'Recovery Cheat Sheet',
        badge: 'reference',
        content: `
<div class="table-wrap"><table>
<tr><th>Situation</th><th>Command</th></tr>
<tr><td>Agent just broke something, haven't committed</td><td><code>git checkout .</code></td></tr>
<tr><td>Need a specific old version</td><td><code>git log --oneline</code> → find hash → <code>git checkout &lt;hash&gt; -- .</code></td></tr>
<tr><td>Everything is a mess, go nuclear</td><td><code>git reset --hard HEAD</code></td></tr>
<tr><td>See what agent changed (before commit)</td><td><code>git diff</code></td></tr>
<tr><td>See what agent changed (after commit)</td><td><code>git diff HEAD~1</code></td></tr>
</table></div>
<div class="alert alert-warn"><span class="alert-icon">&#9888;</span><div><code>git reset --hard HEAD</code> erases all uncommitted work permanently. Only use when you truly want to discard everything since the last commit.</div></div>
`
      },
      {
        title: 'Week-by-Week Iteration Plan',
        badge: 'workflow',
        content: `
<div class="timeline">
  <div class="tl-item"><h4>Week 1</h4><p>Just commit after every working change. Build the muscle memory of <code>git add . && git commit -m "message"</code>.</p></div>
  <div class="tl-item"><h4>Week 2</h4><p>Start using <code>git diff</code> before committing. You'll notice patterns — files you didn't expect the agent to touch.</p></div>
  <div class="tl-item"><h4>Week 3</h4><p>Start branching before medium or large tasks. This gives you a safety net for anything non-trivial.</p></div>
  <div class="tl-item"><h4>Week 4+</h4><p>Ask your agent to commit for you with descriptive messages. Claude Code and Cursor can run git commands directly.</p></div>
</div>
`
      }
    ]
  },
  {
    id: 'skill2',
    num: 'Skill 2',
    title: 'Start Fresh',
    subtitle: 'Recognize context degradation and restart without losing progress.',
    sections: [
      {
        title: 'Recognizing Context Degradation',
        badge: 'reference',
        content: `
<p>Your agent's context window is like a whiteboard with limited space. As the conversation grows, early instructions get compressed or dropped. Here are the <strong>warning signs</strong>:</p>
<div class="checklist">
  <label class="check-item"><input type="checkbox" data-skill="2"><span class="check-box"></span><span class="check-label">Agent repeats a mistake you corrected 10+ messages ago</span></label>
  <label class="check-item"><input type="checkbox" data-skill="2"><span class="check-box"></span><span class="check-label">It "forgets" architectural decisions and re-proposes rejected alternatives</span></label>
  <label class="check-item"><input type="checkbox" data-skill="2"><span class="check-box"></span><span class="check-label">It rewrites files it already completed successfully</span></label>
  <label class="check-item"><input type="checkbox" data-skill="2"><span class="check-box"></span><span class="check-label">Responses get shorter, less detailed, or more generic</span></label>
  <label class="check-item"><input type="checkbox" data-skill="2"><span class="check-box"></span><span class="check-label">It contradicts its own earlier work without acknowledging the change</span></label>
</div>
<div class="alert alert-tip"><span class="alert-icon">&#128161;</span><div>When you see <strong>2 or more</strong> of these signs, the context is degraded. Stop, save your scaffold docs, and start a fresh session.</div></div>
`
      },
      {
        title: 'Simple Fix: The Handoff Message',
        badge: 'template',
        content: `
<p>Don't just open a new chat and wing it. Write a <strong>handoff message</strong> — a summary that gives the new session everything it needs. This takes 5 minutes and saves hours.</p>
<div class="prompt-card" onclick="copyPrompt(this)"><p>I'm continuing a project. Here's where we are:

PROJECT: [one-line description]
TECH STACK: [languages, frameworks, database]
WHAT'S DONE: [list completed features]

- [decision 1 and why]
- [decision 2 and why]

- [issue 1]

`
      },

      },
      {
        title: 'How to Use Scaffold Docs in Practice',
        badge: 'workflow',
        content: `
<p><strong>Starting a session:</strong></p>
<div class="prompt-card" onclick="copyPrompt(this)"><p>Read PLANNING.md, TASKS.md, CONTEXT.md, and WORKFLOW.md before doing anything. These files describe the current state of the project. Update CONTEXT.md with today's session date and begin working on the next incomplete task in TASKS.md.</p></div>

<p><strong>During a session</strong> (every 3-4 completed sub-tasks):</p>

            <span class="badge badge-${sec.badge}">${sec.badge}</span>
          </div>
          <div class="section-body">${sec.content}</div>
        </div>
      `).join('')}
    </div>
  `).join('');

  updateProgress();
}

function switchTab(id) {
  activeTab = id;
  render();
  window.scrollTo({ top: document.querySelector('.nav').offsetTop - 10, behavior: 'smooth' });
}

function toggleSection(id) {
  document.getElementById(id).classList.toggle('open');
}

function copyCode(btn) {
  const code = btn.previousElementSibling.textContent;
  navigator.clipboard.writeText(code);
  btn.textContent = 'Copied!';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
}

function copyPrompt(card) {
  const text = card.querySelector('p').textContent;
  navigator.clipboard.writeText(text);
  card.classList.add('copied-card');
  setTimeout(() => card.classList.remove('copied-card'), 2000);
}

// ─── PROGRESS ────────────────────────────────────────────────
function getAllCheckboxes() { return document.querySelectorAll('.check-item input[type="checkbox"]'); }

function getSkillProgress(skillId) {
  const num = skillId.replace('skill','').replace('workflow','6');
  const boxes = document.querySelectorAll(`.check-item input[data-skill="${num}"]`);
  if (!boxes.length) return 0;
  const checked = [...boxes].filter(b => b.checked).length;
  return checked / boxes.length;
}

function updateProgress() {
  const all = getAllCheckboxes();
  const checked = [...all].filter(b => b.checked).length;
  const pct = all.length ? Math.round((checked / all.length) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${checked} / ${all.length}`;
}

// Delegate checkbox events
document.addEventListener('change', e => {
  if (e.target.matches('.check-item input')) {
    // Save state
    const allBoxes = getAllCheckboxes();
    const state = [...allBoxes].map(b => b.checked);
    try { sessionStorage.setItem('agentGuideProgress', JSON.stringify(state)); } catch(e) {}
    updateProgress();
    // Update nav dots
    const navBtns = document.querySelectorAll('.nav-btn');
    skills.forEach((s, i) => {
      const done = getSkillProgress(s.id);
      navBtns[i].classList.toggle('done', done === 1);
      navBtns[i].classList.toggle('partial', done > 0 && done < 1);
    });
  }
});

// Restore state
function restoreProgress() {
  try {
    const state = JSON.parse(sessionStorage.getItem('agentGuideProgress'));
    if (state) {
      const allBoxes = getAllCheckboxes();
      state.forEach((checked, i) => { if (allBoxes[i]) allBoxes[i].checked = checked; });
    }
  } catch(e) {}
  updateProgress();
}

render();
restoreProgress();
</script>
