<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AgentSentry Dashboard v4</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;--yellow:#d29922;--red:#f85149;--orange:#db6d28;--purple:#bc8cff;--radius:8px;--gap:16px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);display:grid;grid-template-columns:220px 1fr;min-height:100vh}
nav{background:var(--surface);border-right:1px solid var(--border);padding:var(--gap);display:flex;flex-direction:column;gap:4px}
nav h2{font-size:14px;color:var(--accent);margin-bottom:12px;letter-spacing:1px}
nav a{color:var(--muted);text-decoration:none;padding:8px 12px;border-radius:var(--radius);font-size:13px;transition:all .2s}
nav a:hover,nav a.active{background:var(--bg);color:var(--text)}
nav .sep{font-size:11px;color:var(--muted);margin:8px 0 4px 12px;text-transform:uppercase;letter-spacing:1px}
main{padding:24px;overflow-y:auto;max-height:100vh}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:var(--gap)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.card h4{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.card .val{font-size:28px;font-weight:700}
.row{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap);margin-top:var(--gap)}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.panel h3{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.bar-track{background:var(--bg);border-radius:4px;height:8px;margin-top:4px;margin-bottom:10px}
.bar-fill{height:100%;border-radius:4px;transition:width .4s}
.log-item{padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;display:flex;justify-content:space-between}
.log-item .ts{color:var(--muted);font-size:11px}
.toggle{display:flex;gap:4px;margin-bottom:var(--gap)}.toggle button{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:var(--radius);cursor:pointer;font-size:12px}
.toggle button.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
table{width:100%;border-collapse:collapse;font-size:13px}th,td{text-align:left;padding:8px 12px;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-size:11px;text-transform:uppercase;cursor:pointer;user-select:none}
.sev-critical{color:var(--red)}.sev-high{color:var(--orange)}.sev-medium{color:var(--yellow)}.sev-low{color:var(--green)}
.gauge-ring{transform:rotate(-90deg)}.gauge-text{font-size:28px;font-weight:700;fill:var(--text);text-anchor:middle;dominant-baseline:central}
.bar-chart{display:flex;align-items:flex-end;gap:3px;height:120px;margin-top:8px}
.bar-col{flex:1;background:var(--accent);border-radius:2px 2px 0 0;min-width:6px;position:relative;transition:height .3s}
.bar-col:hover::after{content:attr(data-v);position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--text)}
.no-data{color:var(--muted);font-size:13px;padding:16px;text-align:center;font-style:italic}
.freshness{display:inline-block;font-size:10px;padding:2px 6px;border-radius:10px;margin-left:6px;font-weight:500}
.fresh-live{background:#3fb95033;color:var(--green)}.fresh-recent{background:#d2992233;color:var(--yellow)}.fresh-stale{background:#f8514933;color:var(--red)}
h1{font-size:22px;margin-bottom:var(--gap)}
.level-bar{display:flex;gap:6px;margin-top:8px}.level-step{flex:1;height:8px;border-radius:4px;background:var(--border);transition:background .3s}
.level-step.active{background:var(--accent)}.level-step.locked{background:var(--border)}
.skill-lock{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;border-bottom:1px solid var(--border)}
.skill-lock .dot{width:10px;height:10px;border-radius:50%}.dot.on{background:var(--green)}.dot.off{background:var(--border)}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;margin:2px;background:var(--bg);border:1px solid var(--border)}
@media(max-width:768px){body{grid-template-columns:1fr}nav{flex-direction:row;overflow-x:auto;border-right:none;border-bottom:1px solid var(--border)}.row{grid-template-columns:1fr}}
</style></head><body>
<nav>
<h2>AgentSentry v4</h2>
<a href="#overview">Overview</a>
<span class="sep">Skills</span>
<a href="#skill-1">Save Points</a>
<a href="#skill-2">Context Health</a>
<a href="#skill-3">Standing Orders</a>
<a href="#skill-4">Small Bets</a>
<a href="#skill-5">Safety</a>
<span class="sep">Reports</span>
<a href="#audit">Audit Report</a>
<a href="#trends">Trends</a>
<span class="sep">System</span>
<a href="#plugins">Plugins</a>
<a href="#enrichment">Enrichment</a>
</nav>
<main id="app"></main>
<script>
const $=id=>document.getElementById(id),app=$('app');
let D={session:[],audit:[],history:[],commits:[],range:'24h'};
const skills=['Save Points','Context Health','Standing Orders','Small Bets','Safety'];
const skillKeys=['savepoints','context','orders','smallbets','safety'];
const levelNames=['Safe Ground','Clear Head','House Rules','Right Size','Full Guard'];
const levelSkills=['save_points','context_health','standing_orders','small_bets','proactive_safety'];

async function load(f){try{const r=await fetch('data/'+f);if(!r.ok)return[];const t=await r.text();return t.trim().split('\n').filter(Boolean).map(l=>{try{return JSON.parse(l)}catch{return null}}).filter(Boolean)}catch{return[]}}
async function refresh(){[D.session,D.audit,D.history,D.commits]=await Promise.all(['session-log.json','audit-results.json','health-history.json','commit-history.json'].map(load));render()}
function colorFor(v){return v>=80?'var(--green)':v>=60?'var(--yellow)':v>=40?'var(--orange)':'var(--red)'}
function ring(score,size=110){const r=45,c=2*Math.PI*r,o=c*(1-score/100);
return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--border)" stroke-width="8"/><circle class="gauge-ring" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${colorFor(score)}" stroke-width="8" stroke-dasharray="${c}" stroke-dashoffset="${o}" stroke-linecap="round"/><text class="gauge-text" x="${size/2}" y="${size/2}">${score}</text></svg>`}
function barChart(vals,h=120){if(!vals.length)return '<div class="bar-chart"><span style="color:var(--muted);font-size:12px">No data</span></div>';
const mx=Math.max(...vals,1);return `<div class="bar-chart" style="height:${h}px">${vals.map(v=>`<div class="bar-col" style="height:${(v/mx)*100}%" data-v="${v}"></div>`).join('')}</div>`}
function scoreBar(name,score){return `<div><div style="display:flex;justify-content:space-between;font-size:13px"><span>${name}</span><span style="color:${colorFor(score)}">${score}</span></div><div class="bar-track"><div class="bar-fill" style="width:${score}%;background:${colorFor(score)}"></div></div></div>`}
function freshBadge(data){if(!data||!data.length)return `<span class="freshness fresh-stale">no data</span>`;const latest=data[data.length-1];const ts=latest.ts||latest.timestamp||latest.date;if(!ts)return `<span class="freshness fresh-stale">no timestamp</span>`;const age=Date.now()-new Date(ts).getTime();if(age<36e5)return `<span class="freshness fresh-live">live</span>`;if(age<864e5)return `<span class="freshness fresh-recent">${Math.round(age/36e5)}h ago</span>`;return `<span class="freshness fresh-stale">${Math.round(age/864e5)}d ago</span>`}
function noData(msg){return `<div class="no-data">${msg||'No data available'}</div>`}
function fmtTime(ts){return ts?new Date(ts).toLocaleTimeString():'--'}

function getEnablementLevel(){
  const has={save_points:false,context_health:false,standing_orders:false,small_bets:false,proactive_safety:false};
  if(D.commits.length||D.session.some(e=>e.type==='uncommitted'))has.save_points=true;
  if(D.session.some(e=>e.type==='context'||e.type==='degradation'))has.context_health=true;
  if(D.session.some(e=>e.type==='rules')||D.audit.some(a=>a.category==='orders'))has.standing_orders=true;
  if(D.session.some(e=>e.type==='task'&&e.risk!=null))has.small_bets=true;
  if(D.audit.some(a=>a.check?.includes('secret')||a.category==='safety')||D.session.some(e=>e.type==='errorcov'))has.proactive_safety=true;
  let level=0;
  if(has.save_points)level=1;
  if(level>=1&&has.context_health)level=2;
  if(level>=2&&has.standing_orders)level=3;
  if(level>=3&&has.small_bets)level=4;
  if(level>=4&&has.proactive_safety)level=5;
  return {level,has}
}

function pgOverview(){
  const health=D.history.length?D.history[D.history.length-1].score??72:72;
  const commits=D.commits.filter(c=>{const d=new Date(c.ts||c.date);return Date.now()-d<864e5}).length;
  const ctx=D.session.find(e=>e.type==='context')?.usage??54;
  const blast=D.commits.length?Math.round(D.commits.reduce((s,c)=>(s+(c.files||0)),0)/D.commits.length):3;
  const violations=D.audit.filter(a=>a.severity==='critical'||a.severity==='high').length;
  const lastScan=D.audit.length?new Date(D.audit[D.audit.length-1].ts||Date.now()).toLocaleTimeString():'N/A';
  const sk=skillKeys.map((_,i)=>D.history.length&&D.history[D.history.length-1][skillKeys[i]]||[85,54,78,66,90][i]);
  const events=D.session.slice(-10).reverse();
  const {level,has}=getEnablementLevel();
  const levelColor=level>=4?'var(--green)':level>=2?'var(--yellow)':'var(--red)';
  return `<h1>Overview ${freshBadge(D.session)}</h1>
<div class="toggle">${['24h','7d','30d'].map(r=>`<button class="${D.range===r?'active':''}" onclick="D.range='${r}';render()">${r}</button>`).join('')}</div>
<div style="display:flex;gap:var(--gap);align-items:start;flex-wrap:wrap">
<div class="card" style="text-align:center"><h4>Health Score</h4>${ring(health)}</div>
<div class="card" style="min-width:200px"><h4>Enablement Level</h4><div class="val" style="color:${levelColor}">${level}/5</div><div style="font-size:14px;color:var(--accent);margin:4px 0">${levelNames[Math.max(level-1,0)]}</div><div class="level-bar">${[1,2,3,4,5].map(i=>`<div class="level-step ${i<=level?'active':'locked'}"></div>`).join('')}</div><div style="margin-top:10px">${levelSkills.map((s,i)=>`<div class="skill-lock"><span class="dot ${has[s]?'on':'off'}"></span><span style="color:${has[s]?'var(--text)':'var(--muted)'}">${skills[i]}</span></div>`).join('')}</div></div>
<div class="cards" style="flex:1">${[['Commits Today',commits],['Context Usage',ctx+'%'],['Blast Radius',blast+' files'],['Violations',violations],['Last Scan',lastScan]].map(([l,v])=>`<div class="card"><h4>${l}</h4><div class="val">${v}</div></div>`).join('')}</div></div>
<div class="row">
<div class="panel"><h3>Skills Health</h3>${skills.map((s,i)=>scoreBar(s,sk[i])).join('')}</div>
<div class="panel"><h3>Recent Events</h3>${events.length?events.map(e=>`<div class="log-item"><span>${e.msg||e.message||e.type||'event'}</span><span class="ts">${fmtTime(e.ts||e.timestamp)}</span></div>`).join(''):noData('No events yet')}</div></div>`}

function pgSkill1(){const c=D.commits.slice(-15);
return `<h1>Save Points ${freshBadge(D.commits)}</h1>
<div class="cards"><div class="card"><h4>Branch</h4><div class="val" style="font-size:16px">${c.length?c[c.length-1].branch||'main':'main'}</div></div>
<div class="card"><h4>Commits (30d)</h4><div class="val">${c.length}</div></div>
<div class="card"><h4>Uncommitted</h4><div class="val">${D.session.filter(e=>e.type==='uncommitted').length||0}</div></div></div>
<div class="panel" style="margin-top:var(--gap)"><h3>Commit History</h3>
<table><tr><th>Hash</th><th>Message</th><th>Files</th><th>Time</th></tr>
${c.reverse().map(x=>`<tr><td style="font-family:monospace;font-size:12px">${(x.hash||'--').slice(0,7)}</td><td>${x.msg||x.message||'--'}</td><td>${x.files||0}</td><td>${x.ts?new Date(x.ts).toLocaleDateString():'--'}</td></tr>`).join('')}</table></div>`}

function pgSkill2(){const usage=D.session.find(e=>e.type==='context')?.usage??54;
return `<h1>Context Health ${freshBadge(D.session.filter(e=>e.type==='context'))}</h1>
<div style="display:flex;gap:var(--gap);align-items:start;flex-wrap:wrap">
<div class="card" style="text-align:center"><h4>Context Usage</h4>${ring(usage)}</div>
<div class="cards" style="flex:1">
<div class="card"><h4>Degradation Signals</h4><div class="val">${D.session.filter(e=>e.type==='degradation').length||0}</div></div>
<div class="card"><h4>Scaffold Freshness</h4><div class="val">${D.session.find(e=>e.type==='scaffold')?.age||'OK'}</div></div></div></div>
<div class="panel" style="margin-top:var(--gap)"><h3>Context Events</h3>
${D.session.filter(e=>e.type==='context'||e.type==='degradation').slice(-10).reverse().map(e=>`<div class="log-item"><span>${e.msg||e.type}</span><span class="ts">${fmtTime(e.ts||e.timestamp)}</span></div>`).join('')||noData('No events recorded')}</div>`}

function pgSkill3(){const v=D.audit.filter(a=>a.category==='orders'||a.check?.includes('order'));
return `<h1>Standing Orders ${freshBadge(D.audit)}</h1>
<div class="cards"><div class="card"><h4>Rules Sections</h4><div class="val">${D.session.find(e=>e.type==='rules')?.sections||5}</div></div>
<div class="card"><h4>Coverage</h4><div class="val">${D.session.find(e=>e.type==='rules')?.coverage||'78%'}</div></div>
<div class="card"><h4>Violations</h4><div class="val">${v.length}</div></div></div>
<div class="panel" style="margin-top:var(--gap)"><h3>Violation History</h3>
<table><tr><th>Check</th><th>Severity</th><th>Detail</th></tr>
${v.slice(-10).map(a=>`<tr><td>${a.check||a.name||'--'}</td><td class="sev-${a.severity||'low'}">${a.severity||'low'}</td><td>${a.detail||a.msg||'--'}</td></tr>`).join('')}</table></div>`}

function pgSkill4(){const c=D.commits;const sizes=c.map(x=>x.files||0);
return `<h1>Small Bets ${freshBadge(D.commits)}</h1>
<div class="cards"><div class="card"><h4>Avg Blast Radius</h4><div class="val">${sizes.length?Math.round(sizes.reduce((a,b)=>a+b,0)/sizes.length):0}</div></div>
<div class="card"><h4>Max Files Changed</h4><div class="val">${sizes.length?Math.max(...sizes):0}</div></div>
<div class="card"><h4>Tasks Tracked</h4><div class="val">${D.session.filter(e=>e.type==='task').length||0}</div></div></div>
<div class="row"><div class="panel"><h3>Commit Size Distribution</h3>${barChart(sizes.slice(-30))}</div>
<div class="panel"><h3>Risk Scores</h3>${D.session.filter(e=>e.risk!=null).slice(-8).map(e=>scoreBar(e.msg||'task',100-e.risk)).join('')||noData('No risk data')}</div></div>`}

function pgSkill5(){return `<h1>Safety ${freshBadge(D.audit)}</h1>
<div class="cards"><div class="card"><h4>Secrets Blocked</h4><div class="val">${D.audit.filter(a=>a.check?.includes('secret')).length||0}</div></div>
<div class="card"><h4>Error Handling</h4><div class="val">${D.session.find(e=>e.type==='errorcov')?.coverage||'--'}</div></div>
<div class="card"><h4>Warnings</h4><div class="val">${D.audit.filter(a=>a.severity==='medium'||a.severity==='low').length}</div></div></div>
<div class="panel" style="margin-top:var(--gap)"><h3>Safety Events</h3>
${D.audit.filter(a=>a.check?.includes('secret')||a.check?.includes('safety')||a.category==='safety').slice(-10).map(a=>`<div class="log-item"><span class="sev-${a.severity||'low'}">[${a.severity||'info'}]</span>&nbsp;${a.detail||a.check||'--'}</div>`).join('')||noData('No safety events')}</div>`}

let auditSort={col:'severity',dir:1};
function pgAudit(){
  let sorted=[...D.audit];
  const sevOrder={critical:0,high:1,medium:2,low:3};
  const counts={critical:0,high:0,medium:0,low:0};sorted.forEach(a=>counts[a.severity]=(counts[a.severity]||0)+1);
  sorted.sort((a,b)=>{
    let va,vb;
    if(auditSort.col==='severity'){va=sevOrder[a.severity]??9;vb=sevOrder[b.severity]??9}
    else{va=(a[auditSort.col]||a.msg||'').toString().toLowerCase();vb=(b[auditSort.col]||b.msg||'').toString().toLowerCase()}
    if(va<vb)return -1*auditSort.dir;if(va>vb)return 1*auditSort.dir;return 0
  });
  const arrow=c=>auditSort.col===c?(auditSort.dir===1?' \u25B2':' \u25BC'):'';
  return `<h1>Audit Report ${freshBadge(D.audit)}</h1>
${!sorted.length?noData('No audit results available -- run /agent-sentry audit to generate'):`<div class="cards">${Object.entries(counts).map(([k,v])=>`<div class="card"><h4 class="sev-${k}">${k}</h4><div class="val">${v}</div></div>`).join('')}</div>
<div class="panel" style="margin-top:var(--gap)"><table id="audit-tbl"><tr><th onclick="sortAudit('check')">Check${arrow('check')}</th><th onclick="sortAudit('severity')">Severity${arrow('severity')}</th><th onclick="sortAudit('detail')">Detail${arrow('detail')}</th></tr>
${sorted.map(a=>`<tr><td>${a.check||a.name||'--'}</td><td class="sev-${a.severity||'low'}">${a.severity||'low'}</td><td>${a.detail||a.msg||'--'}</td></tr>`).join('')}</table></div>`}`}

function pgTrends(){const scores=D.history.map(h=>h.score||0);
  const weekly=[];for(let i=0;i<D.audit.length;i+=7)weekly.push(D.audit.slice(i,i+7).length);
  const cFreq=[];const days={};D.commits.forEach(c=>{const d=new Date(c.ts||c.date).toLocaleDateString();days[d]=(days[d]||0)+1});Object.values(days).forEach(v=>cFreq.push(v));
  return `<h1>Trends ${freshBadge(D.history)}</h1>
<div class="row"><div class="panel"><h3>Health Score (30d)</h3>${barChart(scores.slice(-30))}</div>
<div class="panel"><h3>Violations per Week</h3>${barChart(weekly)}</div></div>
<div class="row"><div class="panel"><h3>Commit Frequency</h3>${barChart(cFreq.slice(-30))}</div>
<div class="panel"><h3>Score Range</h3><div style="font-size:13px;margin-top:8px">Min: ${scores.length?Math.min(...scores):'--'} / Max: ${scores.length?Math.max(...scores):'--'} / Avg: ${scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):'--'}</div></div></div>`}

function pgPlugins(){
  const pluginEvents=D.session.filter(e=>e.type==='plugin');
  const pluginMap={};
  pluginEvents.forEach(e=>{
    const name=e.plugin||'unknown';
    if(!pluginMap[name])pluginMap[name]={name,status:'inactive',version:'--',count:0};
    if(e.status)pluginMap[name].status=e.status;
    if(e.version)pluginMap[name].version=e.version;
    pluginMap[name].count++;
  });
  const plugins=Object.values(pluginMap);
  const active=plugins.filter(p=>p.status==='active').length;
  return `<h1>Plugins ${freshBadge(pluginEvents)}</h1>
<div class="cards">
<div class="card"><h4>Loaded Plugins</h4><div class="val">${plugins.length}</div></div>
<div class="card"><h4>Active</h4><div class="val" style="color:var(--green)">${active}</div></div>
<div class="card"><h4>Inactive</h4><div class="val" style="color:var(--muted)">${plugins.length-active}</div></div>
<div class="card"><h4>Total Events</h4><div class="val">${pluginEvents.length}</div></div></div>
<div class="panel" style="margin-top:var(--gap)"><h3>Plugin Registry</h3>
${plugins.length?`<table><tr><th>Plugin</th><th>Status</th><th>Version</th><th>Events</th></tr>
${plugins.map(p=>`<tr><td>${p.name}</td><td style="color:${p.status==='active'?'var(--green)':'var(--muted)'}">${p.status}</td><td>${p.version}</td><td>${p.count}</td></tr>`).join('')}</table>`:noData('No plugins loaded')}</div>
<div class="panel" style="margin-top:var(--gap)"><h3>Plugin Event Log</h3>
${pluginEvents.slice(-10).reverse().map(e=>`<div class="log-item"><span>${e.msg||e.plugin||'event'}</span><span class="ts">${fmtTime(e.ts||e.timestamp)}</span></div>`).join('')||noData('No plugin events')}</div>`}

function pgEnrichment(){
  const enrichEvents=D.session.filter(e=>e.type==='enrichment');
  const tagCounts={};
  enrichEvents.forEach(e=>{(e.cross_tags||[]).forEach(t=>{tagCounts[t]=(tagCounts[t]||0)+1})});
  const tagEntries=Object.entries(tagCounts).sort((a,b)=>b[1]-a[1]);
  const rootCauses=enrichEvents.filter(e=>e.root_cause).slice(-10).reverse();
  const tagMax=tagEntries.length?Math.max(...tagEntries.map(t=>t[1]),1):1;
  return `<h1>Enrichment ${freshBadge(enrichEvents)}</h1>
<div class="cards">
<div class="card"><h4>Enrichment Events</h4><div class="val">${enrichEvents.length}</div></div>
<div class="card"><h4>Unique Tags</h4><div class="val">${tagEntries.length}</div></div>
<div class="card"><h4>Root Causes</h4><div class="val">${rootCauses.length}</div></div></div>
<div class="row">
<div class="panel"><h3>Cross-Tag Distribution</h3>
${tagEntries.length?tagEntries.map(([tag,cnt])=>`<div><div style="display:flex;justify-content:space-between;font-size:13px"><span class="tag">${tag}</span><span style="color:var(--accent)">${cnt}</span></div><div class="bar-track"><div class="bar-fill" style="width:${(cnt/tagMax)*100}%;background:var(--purple)"></div></div></div>`).join(''):noData('No cross-tags found')}</div>
<div class="panel"><h3>Root Cause Hints</h3>
${rootCauses.length?rootCauses.map(e=>`<div class="log-item"><span>${e.root_cause}</span><span class="ts">${fmtTime(e.ts||e.timestamp)}</span></div>`).join(''):noData('No root cause hints')}</div></div>
<div class="panel" style="margin-top:var(--gap)"><h3>Enrichment Timeline</h3>
${enrichEvents.slice(-12).reverse().map(e=>`<div class="log-item"><span>${e.msg||'enrichment'} ${(e.cross_tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</span><span class="ts">${fmtTime(e.ts||e.timestamp)}</span></div>`).join('')||noData('No enrichment events')}</div>`}

const pages={overview:pgOverview,'skill-1':pgSkill1,'skill-2':pgSkill2,'skill-3':pgSkill3,'skill-4':pgSkill4,'skill-5':pgSkill5,audit:pgAudit,trends:pgTrends,plugins:pgPlugins,enrichment:pgEnrichment};
function render(){const h=(location.hash||'#overview').slice(1);app.innerHTML=(pages[h]||pgOverview)();
document.querySelectorAll('nav a').forEach(a=>{a.classList.toggle('active',a.getAttribute('href')==='#'+h)})}
window.addEventListener('hashchange',render);
window.sortAudit=function(col){if(auditSort.col===col)auditSort.dir*=-1;else{auditSort.col=col;auditSort.dir=1}render()};
refresh();setInterval(refresh,30000);
</script></body></html>
