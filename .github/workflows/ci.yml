name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: agent-sentry/package-lock.json
      - run: cd agent-sentry && npm ci
      - run: cd agent-sentry && npm run build
      - run: cd agent-sentry && npm test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: agent-sentry/package-lock.json
      - run: cd agent-sentry && npm ci
      - run: cd agent-sentry && npm run lint

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: agent-sentry/package-lock.json
      - run: cd agent-sentry && npm ci
      - name: Check for dependency vulnerabilities
        run: cd agent-sentry && npm audit --omit=dev --audit-level=high

  smoke-test-install:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: agent-sentry/package-lock.json
      - run: cd agent-sentry && npm ci && npm run build
      - name: Pack and install in fresh directory
        run: |
          cd agent-sentry
          TARBALL=$(npm pack | tail -1)
          mkdir /tmp/test-install && cd /tmp/test-install
          npm init -y
          npm install "$GITHUB_WORKSPACE/agent-sentry/$TARBALL" --ignore-scripts
      - name: Verify require('@calabamatex/agentsentry') works
        run: |
          cd /tmp/test-install
          node -e "const a = require('@calabamatex/agentsentry'); console.log('Import OK:', Object.keys(a).length, 'exports')"
      - name: Verify MCP server entry point is valid
        run: |
          cd /tmp/test-install
          node -c node_modules/@calabamatex/agentsentry/dist/src/mcp/server.js
      - name: Verify CLI entry point is valid
        run: |
          cd /tmp/test-install
          node -c node_modules/@calabamatex/agentsentry/dist/src/cli/index.js
      - name: Verify config resolution module exists
        run: |
          cd /tmp/test-install
          node -e "const { resolveConfigPath } = require('@calabamatex/agentsentry'); console.log('Config path:', resolveConfigPath() || 'defaults')"

  doc-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check that documented doc links exist
        run: |
          errors=0
          for f in agent-sentry/docs/getting-started.md agent-sentry/docs/api-reference.md \
                   agent-sentry/docs/memory-schema.md agent-sentry/docs/plugin-tutorial.md \
                   agent-sentry/docs/ROADMAP.md; do
            if [ ! -f "$f" ]; then
              echo "ERROR: $f referenced in README but missing"
              errors=$((errors + 1))
            fi
          done
          for f in docs/architecture/memory-model.md docs/architecture/enablement-model.md \
                   docs/architecture/mcp-integration.md; do
            if [ ! -f "agent-sentry/$f" ]; then
              echo "ERROR: agent-sentry/$f missing"
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "Found $errors missing documentation files"
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: agent-sentry/package-lock.json
      - run: cd agent-sentry && npm ci && npm run build
      - name: Run documentation contract tests
        run: cd agent-sentry && npx vitest run tests/contracts/doc-contracts.test.ts --reporter=verbose

  benchmark:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: agent-sentry/package-lock.json
      - run: cd agent-sentry && npm ci
      - run: cd agent-sentry && npm run build
      - name: Run performance benchmarks with regression thresholds
        run: cd agent-sentry && npx vitest run tests/performance/benchmark-regression.test.ts --reporter=verbose
        timeout-minutes: 5
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: agent-sentry/benchmarks/ci-latest.json
          retention-days: 30
